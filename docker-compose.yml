version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: wind_work_postgres_db
    restart: always
    environment:
      POSTGRES_USER: user_admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: my_database
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: wind_work_redis
    restart: always
    ports:
      - "6379:6379"


  monolithic:
    image: wind-work-monolithic:latest
    container_name: wind_work_monolithic
    restart: always
    depends_on:
      - db
      - redis
    ports:
      - "3000:3000"

    volumes:
      - ./.secret:/app/.secret
    environment:
      - DATABASE_URL=postgresql://user_admin:password123@db:5432/my_database
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_PRIVATE_KEY_FILE=./.secret/private.key
      - JWT_PUBLIC_KEY_FILE=./.secret/public.key
      - COOKIE_SECRET=some-secret
      - APP_DOMAIN="my-company.com"
      - CACHE_STRATEGY="redis"
      - PORT=3000



volumes:
  postgres_data: